<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Spec — Consultas</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; color: #1d3b46; }
    li { margin: 4px 0; }
    .ok::before   { content: '✔ '; color: #16a34a; }
    .fail::before { content: '✘ '; color: #e0457b; }
    .fail { color: #e0457b; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Spec del módulo de consultas</h1>
  <ul id="resultados"></ul>
  <script src="../assets/js/lib/storage.js"></script>
  <script src="../assets/js/modules/consultas.js"></script>
  <script src="../assets/js/modules/mascotas.js"></script>
  <script>
    // Mini-runner auto-ejecutable (sin console.log como test).
    const salida = document.getElementById('resultados');
    function it(nombre, fn) {
      const li = document.createElement('li');
      try { fn(); li.className = 'ok'; li.textContent = nombre; }
      catch (err) { li.className = 'fail'; li.textContent = nombre + ' — ' + err.message; }
      salida.appendChild(li);
    }
    function assert(cond, msg) { if (!cond) throw new Error(msg || 'aserción fallida'); }

    // Partir de un estado limpio para no arrastrar datos entre corridas.
    Storage.eliminar('consultas');
    Storage.eliminar('consultas-sembradas');

    it('listar() siembra las 5 consultas iniciales', () => {
      assert(Consultas.listar().length === 5, 'se esperaban 5 consultas sembradas');
    });

    it('reservar() agrega una consulta pendiente', () => {
      const antes = Consultas.listar().length;
      const c = Consultas.reservar({
        cliente: 'Test User', contacto: 'test@correo.com', mascota: 'Firulais',
        motivo: 'Control', day: { date: 'Mié 18 Jun', rank: 3 }, slot: { time: '11:00' },
      });
      assert(c.status === 'pending', 'la nueva consulta debe nacer pendiente');
      assert(Consultas.listar().length === antes + 1, 'debe haber una consulta más');
    });

    it('confirmar() pasa la consulta a estado confirmed', () => {
      const c = Consultas.reservar({
        cliente: 'Confirma User', contacto: 'conf@correo.com', mascota: 'Nube',
        motivo: 'Vacunación', day: { date: 'Lun 16 Jun', rank: 1 }, slot: { time: '12:00' },
      });
      const actualizada = Consultas.confirmar(c.id);
      assert(actualizada && actualizada.status === 'confirmed', 'debe quedar confirmed');
      const guardada = Consultas.listar().find(x => x.id === c.id);
      assert(guardada.status === 'confirmed', 'el cambio debe persistir');
    });

    it('confirmar() reasigna fecha/hora de atención cuando se indican', () => {
      const c = Consultas.reservar({
        cliente: 'Reasigna User', contacto: 'rea@correo.com', mascota: 'Sol',
        motivo: 'Control', day: { date: 'Lun 16 Jun', rank: 1 }, slot: { time: '09:00' },
      });
      const actualizada = Consultas.confirmar(c.id, { date: 'Mié 18 Jun', rank: 3, time: '15:30' });
      assert(actualizada.date === 'Mié 18 Jun', 'debe actualizar la fecha');
      assert(actualizada.rank === 3, 'debe actualizar el rank');
      assert(actualizada.time === '15:30', 'debe actualizar la hora');
    });

    it('contadores() incluye la clave confirmed', () => {
      const c = Consultas.contadores();
      assert(Object.prototype.hasOwnProperty.call(c, 'confirmed'), 'debe existir contador confirmed');
    });

    it('filtrar() busca por nombre de mascota sin distinguir mayúsculas', () => {
      const resultados = Consultas.filtrar({ busqueda: 'luna' });
      assert(resultados.length >= 1, 'debe encontrar al menos una consulta');
      assert(resultados.every(c => c.mascota.toLowerCase().includes('luna')), 'debe coincidir por mascota');
    });

    it('filtrar() busca por dueño usando el campo cliente', () => {
      const resultados = Consultas.filtrar({ busqueda: 'maria' });
      assert(resultados.length >= 1, 'debe encontrar al menos un dueño');
      assert(resultados.every(c => c.cliente.toLowerCase().startsWith('mar')), 'debe coincidir por dueño');
    });

    it('filtrar() limita resultados por estado', () => {
      const resultados = Consultas.filtrar({ estado: 'pending' });
      assert(resultados.length >= 1, 'debe encontrar consultas pendientes');
      assert(resultados.every(c => c.status === 'pending'), 'todas deben estar pendientes');
    });

    it('avanzarEstado() cicla pending → in_progress → done → pending', () => {
      const id = Consultas.listar()[0].id;
      const estadoDe = () => Consultas.listar().find(c => c.id === id).status;
      const inicial = estadoDe();
      const orden = ['pending', 'in_progress', 'done'];
      let actual = inicial;
      for (let i = 0; i < 3; i++) {
        Consultas.avanzarEstado(id);
        const esperado = orden[(orden.indexOf(actual) + 1) % 3];
        assert(estadoDe() === esperado, `tras avanzar debía ser ${esperado}`);
        actual = esperado;
      }
      assert(estadoDe() === inicial, 'tres avances vuelven al estado inicial');
    });

    it('agrupadasPorFecha() ordena por hora (FIFO) y numera la cola', () => {
      const grupos = Consultas.agrupadasPorFecha();
      assert(grupos.length >= 1, 'debe haber al menos un grupo');
      grupos.forEach(g => {
        g.rows.forEach((r, i) => assert(r.queue === i + 1, 'la cola debe numerarse 1..n'));
        for (let i = 1; i < g.rows.length; i++) {
          assert(g.rows[i - 1].time.localeCompare(g.rows[i].time) <= 0, 'orden por hora ascendente');
        }
      });
    });

    it('agrupadasPorFecha() aplica filtros antes de agrupar', () => {
      const grupos = Consultas.agrupadasPorFecha({ estado: 'in_progress' });
      assert(grupos.length >= 1, 'debe haber grupos filtrados');
      grupos.forEach(g => {
        g.rows.forEach(r => assert(r.status === 'in_progress', 'solo deben quedar consultas en curso'));
      });
    });

    it('contadores() suma exactamente el total de consultas', () => {
      const c = Consultas.contadores();
      const total = c.pending + c.confirmed + c.in_progress + c.done + c.cancelado;
      assert(total === Consultas.listar().length, 'los contadores deben cuadrar con el total');
    });

    /* ----- Tests de cancelación (US #4) ----- */

    it('cancelar() cambia el estado a cancelado si la consulta está pendiente', () => {
      const c = Consultas.reservar({
        cliente: 'Cancel User', contacto: 'cancel@correo.com', mascota: 'Rex',
        motivo: 'Control', day: { date: 'Mar 17 Jun', rank: 2 }, slot: { time: '16:00', id: 'd2-16' },
      });
      assert(c.status === 'pending', 'la nueva consulta debe nacer pendiente');
      const cancelada = Consultas.cancelar(c.id);
      assert(cancelada !== null, 'cancelar debe devolver la consulta');
      assert(cancelada.status === 'cancelado', 'el estado debe ser cancelado');
      const guardada = Consultas.listar().find(x => x.id === c.id);
      assert(guardada.status === 'cancelado', 'el cambio debe persistir');
    });

    it('cancelar() retorna null si la consulta no está pendiente', () => {
      const c = Consultas.reservar({
        cliente: 'No Cancel', contacto: 'no@correo.com', mascota: 'Milo',
        motivo: 'Vacunación', day: { date: 'Lun 16 Jun', rank: 1 }, slot: { time: '12:00' },
      });
      Consultas.confirmar(c.id);
      const resultado = Consultas.cancelar(c.id);
      assert(resultado === null, 'no debe cancelar una consulta ya confirmada');
      assert(Consultas.listar().find(x => x.id === c.id).status === 'confirmed', 'el estado debe seguir confirmed');
    });

    it('cancelar() retorna null si el id no existe', () => {
      const resultado = Consultas.cancelar(999999999);
      assert(resultado === null, 'no debe cancelar un id inexistente');
    });

    it('contadores() incluye la clave cancelado y cuadra con el total', () => {
      const c = Consultas.contadores();
      assert(Object.prototype.hasOwnProperty.call(c, 'cancelado'), 'debe existir contador cancelado');
      const total = c.pending + c.confirmed + c.in_progress + c.done + c.cancelado;
      assert(total === Consultas.listar().length, 'los contadores (con cancelado) deben cuadrar');
    });

    /* ----- Tests de listarPorUsuario ----- */

    it('listarPorUsuario() filtra las consultas del usuario indicado', () => {
      const uid = 90001;
      const c1 = Consultas.reservar({
        cliente: 'User A', contacto: 'a@correo.com', mascota: 'Luna',
        motivo: 'Control', day: { date: 'Lun 16 Jun', rank: 1 }, slot: { time: '09:00' },
        usuarioId: uid,
      });
      const c2 = Consultas.reservar({
        cliente: 'User B', contacto: 'b@correo.com', mascota: 'Rex',
        motivo: 'Vacunación', day: { date: 'Mar 17 Jun', rank: 2 }, slot: { time: '10:00' },
        usuarioId: 90002,
      });
      const del = Consultas.listarPorUsuario(uid);
      assert(del.length >= 1, 'debe devolver al menos una consulta del usuario');
      assert(del.every(c => c.usuarioId === uid), 'todas las consultas deben pertenecer al usuario');
      assert(!del.find(c => c.id === c2.id), 'no debe incluir consultas de otro usuario');
    });

    it('listarPorUsuario() devuelve vacío si el usuario no tiene consultas', () => {
      const del = Consultas.listarPorUsuario(99999);
      assert(del.length === 0, 'no debe haber consultas de un usuario inexistente');
    });

    it('listarPorUsuario(null) devuelve vacío', () => {
      const del = Consultas.listarPorUsuario(null);
      assert(del.length === 0, 'null no debe devolver consultas');
    });

    // Limpieza final.
    Storage.eliminar('consultas');
    Storage.eliminar('consultas-sembradas');
  </script>
</body>
</html>
