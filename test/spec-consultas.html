<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Spec — Consultas</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; color: #1d3b46; }
    li { margin: 4px 0; }
    .ok::before   { content: '✔ '; color: #16a34a; }
    .fail::before { content: '✘ '; color: #e0457b; }
    .fail { color: #e0457b; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Spec del módulo de consultas</h1>
  <ul id="resultados"></ul>
  <script src="../assets/js/lib/storage.js"></script>
  <script src="../assets/js/modules/consultas.js"></script>
  <script src="../assets/js/modules/mascotas.js"></script>
  <script>
    // Mini-runner auto-ejecutable (sin console.log como test).
    const salida = document.getElementById('resultados');
    function it(nombre, fn) {
      const li = document.createElement('li');
      try { fn(); li.className = 'ok'; li.textContent = nombre; }
      catch (err) { li.className = 'fail'; li.textContent = nombre + ' — ' + err.message; }
      salida.appendChild(li);
    }
    function assert(cond, msg) { if (!cond) throw new Error(msg || 'aserción fallida'); }

    // Partir de un estado limpio para no arrastrar datos entre corridas.
    Storage.eliminar('consultas');
    Storage.eliminar('consultas-sembradas');

    it('listar() siembra las 5 consultas iniciales', () => {
      assert(Consultas.listar().length === 5, 'se esperaban 5 consultas sembradas');
    });

    it('reservar() agrega una consulta pendiente', () => {
      const antes = Consultas.listar().length;
      const c = Consultas.reservar({
        cliente: 'Test User', contacto: 'test@correo.com', mascota: 'Firulais',
        motivo: 'Control', day: { date: 'Mié 18 Jun', rank: 3 }, slot: { time: '11:00' },
      });
      assert(c.status === 'pending', 'la nueva consulta debe nacer pendiente');
      assert(Consultas.listar().length === antes + 1, 'debe haber una consulta más');
    });

    it('confirmar() pasa la consulta a estado confirmed', () => {
      const c = Consultas.reservar({
        cliente: 'Confirma User', contacto: 'conf@correo.com', mascota: 'Nube',
        motivo: 'Vacunación', day: { date: 'Lun 16 Jun', rank: 1 }, slot: { time: '12:00' },
      });
      const actualizada = Consultas.confirmar(c.id);
      assert(actualizada && actualizada.status === 'confirmed', 'debe quedar confirmed');
      const guardada = Consultas.listar().find(x => x.id === c.id);
      assert(guardada.status === 'confirmed', 'el cambio debe persistir');
    });

    it('confirmar() reasigna fecha/hora de atención cuando se indican', () => {
      const c = Consultas.reservar({
        cliente: 'Reasigna User', contacto: 'rea@correo.com', mascota: 'Sol',
        motivo: 'Control', day: { date: 'Lun 16 Jun', rank: 1 }, slot: { time: '09:00' },
      });
      const actualizada = Consultas.confirmar(c.id, { date: 'Mié 18 Jun', rank: 3, time: '15:30' });
      assert(actualizada.date === 'Mié 18 Jun', 'debe actualizar la fecha');
      assert(actualizada.rank === 3, 'debe actualizar el rank');
      assert(actualizada.time === '15:30', 'debe actualizar la hora');
    });

    it('contadores() incluye la clave confirmed', () => {
      const c = Consultas.contadores();
      assert(Object.prototype.hasOwnProperty.call(c, 'confirmed'), 'debe existir contador confirmed');
    });

    it('avanzarEstado() cicla pending → in_progress → done → pending', () => {
      const id = Consultas.listar()[0].id;
      const estadoDe = () => Consultas.listar().find(c => c.id === id).status;
      const inicial = estadoDe();
      const orden = ['pending', 'in_progress', 'done'];
      let actual = inicial;
      for (let i = 0; i < 3; i++) {
        Consultas.avanzarEstado(id);
        const esperado = orden[(orden.indexOf(actual) + 1) % 3];
        assert(estadoDe() === esperado, `tras avanzar debía ser ${esperado}`);
        actual = esperado;
      }
      assert(estadoDe() === inicial, 'tres avances vuelven al estado inicial');
    });

    it('agrupadasPorFecha() ordena por hora (FIFO) y numera la cola', () => {
      const grupos = Consultas.agrupadasPorFecha();
      assert(grupos.length >= 1, 'debe haber al menos un grupo');
      grupos.forEach(g => {
        g.rows.forEach((r, i) => assert(r.queue === i + 1, 'la cola debe numerarse 1..n'));
        for (let i = 1; i < g.rows.length; i++) {
          assert(g.rows[i - 1].time.localeCompare(g.rows[i].time) <= 0, 'orden por hora ascendente');
        }
      });
    });

    it('contadores() suma exactamente el total de consultas', () => {
      const c = Consultas.contadores();
      const total = c.pending + c.confirmed + c.in_progress + c.done;
      assert(total === Consultas.listar().length, 'los contadores deben cuadrar con el total');
    });

    // Limpieza final.
    Storage.eliminar('consultas');
    Storage.eliminar('consultas-sembradas');
  </script>
</body>
</html>
